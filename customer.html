<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodSaver - Customer Home</title>
    <script src="customer.js" defer></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f6f8fb;
        color: #111;
      }

      header {
        background: #ffffff;
        padding: 20px 40px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      header a {
        color: #000;
        text-decoration: none;
        font-size: 24px;
        font-weight: bold;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-btn {
        background: black;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      .nav-btn:hover {
        opacity: 0.9;
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px 50px;
      }

      .hero {
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        margin-bottom: 25px;
      }

      .hero h1 {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .hero p {
        color: #555;
        font-size: 15px;
      }

      .section-title {
        font-size: 24px;
        margin-bottom: 15px;
      }

      .filters {
        background: white;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        margin-bottom: 25px;
      }

      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      input,
      select {
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        min-width: 180px;
        font-size: 14px;
      }

      .food-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 35px;
      }

      .food-card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        border: 1px solid #eef1f4;
      }

      .food-card h3 {
        margin-bottom: 10px;
        font-size: 20px;
      }

      .food-card p {
        margin-bottom: 8px;
        color: #444;
        font-size: 14px;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: bold;
        color: white;
        margin-bottom: 14px;
      }

      .badge-discount {
        background: #e67e22;
      }

      .badge-free {
        background: #27ae60;
      }

      .badge-regular {
        background: #7f8c8d;
      }

      .request-btn {
        width: 100%;
        padding: 12px;
        background: black;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
      }

      .request-btn:hover {
        opacity: 0.9;
      }

      .request-btn:disabled {
        background: #999;
        cursor: not-allowed;
      }

      .request-history {
        background: white;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .history-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .history-item {
        padding: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #fafafa;
      }

      .empty-text {
        color: #666;
        font-size: 14px;
      }

      footer {
        background: black;
        color: white;
        padding: 25px 20px;
        text-align: center;
        margin-top: 40px;
        font-size: 13px;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 15px;
          align-items: flex-start;
        }

        .hero h1 {
          font-size: 26px;
        }

        .filter-row {
          flex-direction: column;
        }

        input,
        select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">FoodSaver</a>
      <div class="nav-right">
        <button class="nav-btn" onclick="window.location.href='request.html'">
         My Requests
       </button>
        <button class="nav-btn" onclick="goToProfile()">Profile</button>

      </div>
    </header>

    <main class="page">
      <section class="hero">
        <h1>Welcome, Customer</h1>
        <p>
          Browse available food from restaurants, filter items, and request one
          portion quickly.
        </p>
      </section>

      <section class="filters">
        <h2 class="section-title">Browse Food</h2>
        <div class="filter-row">
          <input
            type="text"
            id="searchInput"
            placeholder="Search food or restaurant"
          />

          <select id="typeFilter">
            <option value="all">All Types</option>
            <option value="discount">Discount</option>
            <option value="free">Free Food</option>
            <option value="meal">Meal</option>
            <option value="bakery">Bakery</option>
            <option value="beverage">Beverage</option>
          </select>

          <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="Meal">Meal</option>
            <option value="Bakery">Bakery</option>
            <option value="Beverage">Beverage</option>
          </select>
        </div>
      </section>

      <section>
        <div class="food-grid" id="foodGrid"></div>
      </section>

      
    </main>

    <footer>&copy; 2026 FoodSaver. All rights reserved.</footer>
  </body>
</html>
