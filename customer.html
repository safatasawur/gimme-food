<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodSaver - Customer</title>

<script src="config.js" defer></script>
<script src="customer.js" defer></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f6f8fb;
  color:#111;
}

header{
  background:#fff;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.nav{
  display:flex;
  gap:10px;
}

.nav button{
  background:#111;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

.page{
  max-width:1200px;
  margin:auto;
  padding:25px;
}

.box{
  background:#fff;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filters input,
.filters select{
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

.food-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.card h3{
  margin-bottom:10px;
}

.card p{
  margin-bottom:8px;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  color:#fff;
  font-size:12px;
  margin-bottom:12px;
}

.discount{background:#e67e22;}
.free{background:#27ae60;}
.regular{background:#7f8c8d;}

.btn{
  width:100%;
  border:none;
  padding:11px;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
  margin-top:10px;
}

.btn:disabled{
  background:#999;
  cursor:not-allowed;
}

.list-item{
  padding:12px;
  border:1px solid #eee;
  border-radius:10px;
  margin-bottom:10px;
  background:#fafafa;
}

.small{
  color:#666;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <div class="logo">FoodSaver</div>

  <div class="nav">
    <button onclick="scrollToSection('historyBox')">My Requests</button>
    <button onclick="scrollToSection('notificationBox')">Notifications</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<main class="page">

<div class="box">
  <h1>Welcome Customer</h1>
  <p class="small">Browse available leftover food and request one portion.</p>
</div>

<div class="box">
  <h2 style="margin-bottom:15px;">Browse Food</h2>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="Search food or restaurant">

    <select id="typeFilter">
      <option value="all">All Types</option>
      <option value="discount">Discount</option>
      <option value="free">Free Food</option>
      <option value="meal">Meal</option>
      <option value="bakery">Bakery</option>
      <option value="beverage">Beverage</option>
    </select>

    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="Meal">Meal</option>
      <option value="Bakery">Bakery</option>
      <option value="Beverage">Beverage</option>
    </select>
  </div>
</div>

<div class="food-grid" id="foodGrid"></div>

<div class="box" id="historyBox">
  <h2 style="margin-bottom:15px;">My Requests</h2>
  <div id="historyList"></div>
</div>

<div class="box" id="notificationBox">
  <h2 style="margin-bottom:15px;">Notifications</h2>
  <div id="notificationList"></div>
</div>

</main>

</body>
</html>
