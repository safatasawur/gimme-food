<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodSaver - Owner Dashboard</title>

<script src="config.js" defer></script>
<script src="owner.js" defer></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f6f8fb;
  color:#111;
}

header{
  background:#fff;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.nav{
  display:flex;
  gap:10px;
}

.nav button{
  background:#111;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

.page{
  max-width:1200px;
  margin:auto;
  padding:25px;
}

.box{
  background:#fff;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

.card{
  background:#fff;
  border:1px solid #eee;
  border-radius:14px;
  padding:18px;
}

.card h3{
  margin-bottom:10px;
}

.card p{
  margin-bottom:8px;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  color:#fff;
  font-size:12px;
  margin-bottom:12px;
}

.discount{background:#e67e22;}
.free{background:#27ae60;}
.regular{background:#7f8c8d;}

.btn{
  border:none;
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  color:#fff;
}

.black{background:#111;}
.green{background:#27ae60;}
.red{background:#e74c3c;}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

input,select{
  width:100%;
  padding:11px;
  border:1px solid #ccc;
  border-radius:8px;
  margin-bottom:12px;
}

.list-item{
  padding:12px;
  border:1px solid #eee;
  border-radius:10px;
  margin-bottom:10px;
  background:#fafafa;
}

.small{
  color:#666;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <div class="logo">FoodSaver</div>

  <div class="nav">
    <button onclick="scrollToSection('inventoryBox')">Inventory</button>
    <button onclick="scrollToSection('requestBox')">Requests</button>
    <button onclick="scrollToSection('notificationBox')">Notifications</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<main class="page">

<div class="box">
  <h1>Restaurant Dashboard</h1>
  <p class="small">Manage leftover food inventory and approve customer requests.</p>
</div>

<div class="box">
  <h2 style="margin-bottom:15px;">Add New Food Item</h2>

  <form id="foodForm">
    <input type="text" id="foodName" placeholder="Food name" required>
    <input type="text" id="foodCategory" placeholder="Category (Meal/Bakery/Beverage)" required>
    <input type="text" id="foodIngredients" placeholder="Ingredients comma separated" required>
    <input type="date" id="foodExpiry" required>

    <select id="foodType" required>
      <option value="">Select Type</option>
      <option value="discount">Discount</option>
      <option value="free">Free Food</option>
      <option value="meal">Meal</option>
      <option value="bakery">Bakery</option>
      <option value="beverage">Beverage</option>
    </select>

    <input type="number" id="foodQty" placeholder="Quantity" min="1" value="1" required>

    <button class="btn black" type="submit">Add Item</button>
  </form>
</div>

<div class="box" id="inventoryBox">
  <h2 style="margin-bottom:15px;">My Inventory</h2>
  <div class="grid" id="inventoryGrid"></div>
</div>

<div class="box" id="requestBox">
  <h2 style="margin-bottom:15px;">Pending Requests</h2>
  <div id="requestList"></div>
</div>

<div class="box" id="notificationBox">
  <h2 style="margin-bottom:15px;">Notifications</h2>
  <div id="notificationList"></div>
</div>

</main>

</body>
</html>
