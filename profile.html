<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <script src="config.js?v=1.1" defer></script>
  <script src="profile.js?v=1.1" defer></script>

  <style>
    body {
      font-family: Arial;
      background: #f6f8fb;
      padding: 40px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    p {
      margin-bottom: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 16px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>My Profile</h2>

    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Address:</strong> <span id="address"></span></p>
    <p><strong>Role:</strong> <span id="role"></span></p>

    <!-- Owner only -->
    <div id="ownerSection" style="display:none;">
      <p><strong>Restaurant Name:</strong> <span id="restaurantName"></span></p>
      <p><strong>Restaurant Address:</strong> <span id="restaurantAddress"></span></p>
      <p><strong>Food Type:</strong> <span id="foodType"></span></p>
    </div>

    <button onclick="goBack()">Back</button>
    <button onclick="logout()">Logout</button>
  </div>
</body>
</html>
