<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Inventory</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="logo">FoodSaver</div>
    <nav class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Inventory</a>
      <a href="#">Orders</a>
      <a href="#">Profile</a>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <h1>Restaurant Inventory</h1>
        <p>Manage leftover food, discounts, and available items in one place.</p>
      </div>
      <button class="primary-btn">+ Add New Item</button>
    </section>

    <section class="filters-section">
      <h2>Browse Inventory</h2>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All Inventory</button>
        <button class="filter-btn" data-filter="discount">Discounted</button>
        <button class="filter-btn" data-filter="free">Free Food</button>
        <button class="filter-btn" data-filter="meal">Meals</button>
        <button class="filter-btn" data-filter="bakery">Bakery</button>
        <button class="filter-btn" data-filter="beverage">Beverages</button>
      </div>
    </section>

    <section class="inventory-grid" id="inventoryGrid">
      <!-- Food cards will be inserted here by JavaScript -->
    </section>
  </main>

  <!-- Modal -->
  <div class="modal hidden" id="detailModal">
    <div class="modal-content">
      <button class="close-btn" id="closeModal">&times;</button>
      <h2 id="modalName">Food Name</h2>
      <div class="modal-info">
        <p><strong>Category:</strong> <span id="modalCategory"></span></p>
        <p><strong>Type:</strong> <span id="modalType"></span></p>
        <p><strong>Expiry Date:</strong> <span id="modalExpiry"></span></p>
        <p><strong>Ingredients:</strong></p>
        <p id="modalIngredients"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
