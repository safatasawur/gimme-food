<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Orders - FoodSaver</title>

    <script src="config.js" defer></script>
    <script src="orders.js" defer></script>

    <style>
      /* Exact same CSS styling so the pages perfectly match */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      body {
        background: #f6f8fb;
        color: #222;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: bold;
      }

      .nav {
        display: flex;
        gap: 20px;
        align-items: center;
        position: relative;
      }
      .nav a {
        text-decoration: none;
        color: #444;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav a:hover {
        color: #111;
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px 50px;
        flex: 1;
        width: 100%;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
        background: #ffffff;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
      }
      .hero h1 {
        font-size: 2rem;
        margin-bottom: 10px;
      }
      .hero p {
        color: #666;
      }

      .primary-btn {
        background: #222;
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1rem;
        transition: opacity 0.2s;
      }
      .primary-btn:hover {
        opacity: 0.9;
      }

      .filters-section {
        margin-bottom: 25px;
      }
      .inventory-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }

      .food-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        border: 1px solid #eef1f4;
        transition: transform 0.2s ease;
      }
      .food-card h3 {
        font-size: 1.15rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .food-card p {
        margin-bottom: 8px;
        color: #555;
        font-size: 0.95rem;
      }

      @media (max-width: 768px) {
        .topbar {
          flex-direction: column;
          gap: 15px;
          padding: 20px;
          align-items: center;
        }
        .nav {
          flex-wrap: wrap;
          justify-content: center;
          gap: 12px;
        }
        .hero {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <div class="logo">FoodSaver</div>
      <nav class="nav">
        <a href="owner.html">Inventory</a>
        <a
          href="orders.html"
          style="font-weight: bold; border-bottom: 2px solid #111"
          >Orders</a
        >

        <a
          href="#"
          id="notificationBell"
          style="
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            font-weight: bold;
          "
        >
          Alerts
          <span id="notifCount" style="color: #e74c3c; display: none">(0)</span>
        </a>

        <a href="profile.html">Profile</a>
        <button
          class="primary-btn"
          onclick="logout()"
          style="
            background: #e74c3c;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
          "
        >
          Logout
        </button>
      </nav>
    </header>

    <main class="page">
      <section class="hero">
        <div>
          <h1>Customer Orders</h1>
          <p>Review and manage incoming food requests from customers.</p>
        </div>
      </section>

      <section class="filters-section">
        <div class="inventory-grid" id="requestsGrid">
          <p style="color: #666">Loading requests...</p>
        </div>
      </section>
    </main>
  </body>
</html>
